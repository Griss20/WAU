<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Regístrate en WauPiura para unirte a nuestra comunidad de adopción y rescate de mascotas en la región de Piura.">
  <title>Registro | WauPiura</title>
  <link rel="stylesheet" href="../styles/style.css">
</head>
<body class="auth-body">
  <div class="auth-card">
    <a href="index.html" class="logo" style="justify-content: center; margin-bottom: 0.5rem;"><span>Wau</span>Piura</a>
    <h2>Crea tu cuenta</h2>
    <p>Únete a nuestra comunidad de rescate.</p>
    
    <form class="auth-form" id="register-form">
      <input type="text" placeholder="Nombre completo" class="auth-input" required>
      <input type="email" placeholder="Correo electrónico" class="auth-input" required>
      <input type="password" placeholder="Contraseña" class="auth-input" required>
      <button type="submit" class="btn-register">Registrarme</button>
    </form>
    
    <p style="margin-top: 2rem; font-size: 0.95rem; color: #64748B;">
      ¿Ya tienes cuenta? <a href="iniciar-sesion.html" class="auth-link">Inicia sesión</a>
    </p>

    <a href="index.html" style="display: block; margin-top: 1.5rem; color: #94A3B8; text-decoration: none; font-size: 0.85rem; font-weight: 600; transition: color 0.2s;" onmouseover="this.style.color='var(--azul-oscuro)'" onmouseout="this.style.color='#94A3B8'">← Volver al inicio</a>
  </div>

  <script>
    document.getElementById('register-form').addEventListener('submit', (e) => {
      e.preventDefault();
      alert('Esta es una demostración. Tu cuenta fue creada exitosamente.');
      window.location.href = 'catalogo.html';
    });
  </script>
</body>
</html>
