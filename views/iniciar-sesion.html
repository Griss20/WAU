<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Inicia sesión en WauPiura para poder adoptar o reportar mascotas rescatadas en Piura.">
  <title>Iniciar Sesión | WauPiura</title>
  <link rel="stylesheet" href="../styles/style.css">
  <link rel="stylesheet" href="../styles/auth.css">
</head>
<body class="auth-body">
  <div class="auth-card">
    <a href="index.html" class="logo" style="justify-content: center; margin-bottom: 0.5rem;"><span>Wau</span>Piura</a>
    <h2>¡Qué bueno verte!</h2>
    <p>Ingresa tus datos para continuar.</p>
    
    <form class="auth-form" id="login-form">
      <input type="email" placeholder="Correo electrónico" class="auth-input" required>
      <input type="password" placeholder="Contraseña" class="auth-input" required>
      <button type="submit" class="btn-register">Entrar a mi cuenta</button>
    </form>
    
    <p style="margin-top: 2rem; font-size: 0.95rem; color: #64748B;">
      ¿No tienes cuenta? <a href="registro.html" class="auth-link">Regístrate aquí</a>
    </p>
    
    <a href="index.html" style="display: block; margin-top: 1.5rem; color: #94A3B8; text-decoration: none; font-size: 0.85rem; font-weight: 600; transition: color 0.2s;" onmouseover="this.style.color='var(--azul-oscuro)'" onmouseout="this.style.color='#94A3B8'">← Volver al inicio</a>
  </div>

  <script>
    document.getElementById('login-form').addEventListener('submit', (e) => {
      e.preventDefault();
      alert('Esta es una demostración. El inicio de sesión simulado fue exitoso.');
      window.location.href = 'catalogo.html';
    });
  </script>
</body>
</html>
